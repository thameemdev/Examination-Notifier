name: MGU Exam Monitor

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual triggering

env:
  # Suppress Node.js 20 deprecation warnings by forcing actions runtime to Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      # Required to commit changes back to the repository
      contents: write


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to avoid push issues
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmupdf-dev build-essential

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          # Install browser binaries and their system dependencies
          playwright install chromium --with-deps

      - name: Run Notifier Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUN_MODE: cron
          LOG_LEVEL: INFO
        run: |
          # Create data directory if not present
          mkdir -p data logs
          # Execute the runner orchestrator
          python main.py --mode cron

      - name: Commit and Push DB Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the SQLite database file and logging updates
          git add data/mgu_notifier.db logs/ || true
          
          # Check if there are changes staged for commit
          if ! git diff --cached --quiet; then
            logger.info "Changes detected in SQLite database state. Committing..."
            git commit -m "chore: update database state [skip ci]"
            git push
          else
            logger.info "No database changes detected. Skipping push."
          fi
